name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: cd frontend && npm ci

      - run: cp .dev.vars.example .dev.vars

      - run: npm run build:frontend

      - run: npm run lint

      - run: npm run test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: cd frontend && npm ci

      - run: npm run build:frontend

      - name: Set session secret
        run: echo "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        env:
          ALLOWED_KEYS: ${{ secrets.ALLOWED_KEYS }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production --var ALLOWED_KEYS:$ALLOWED_KEYS
